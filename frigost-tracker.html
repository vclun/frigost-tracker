<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frigost Quest Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #0f1525;
    --surface2: #141c30;
    --border: #1e2d4a;
    --border2: #2a3d5e;
    --ice: #7eb8d4;
    --ice2: #a8d4e8;
    --ice3: #c8e8f4;
    --gold: #c8a96e;
    --gold2: #e0c98a;
    --red: #c04444;
    --green: #3a8a5a;
    --green2: #4aaa6e;
    --text: #d0dde8;
    --text2: #8a9db8;
    --text3: #5a6d84;
    --done-bg: #0d1f14;
    --done-border: #1a3a24;
    --locked-bg: #0e1218;
    --locked-text: #3a4a5a;
    --warn: #c07820;
    --warn2: #e09030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(126,184,212,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(200,169,110,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* HEADER */
  header {
    text-align: center;
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--ice2);
    letter-spacing: 0.08em;
    text-shadow: 0 0 40px rgba(126,184,212,0.3);
  }
  header p {
    color: var(--text2);
    font-style: italic;
    margin-top: 6px;
    font-size: 1rem;
  }

  /* GLOBAL PROGRESS */
  .global-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .global-progress .label {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--text2);
    white-space: nowrap;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--ice), var(--ice2));
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .global-progress .count {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--ice);
    white-space: nowrap;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .tab-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--ice); border-color: var(--border2); }
  .tab-btn.active { background: var(--surface2); color: var(--ice2); border-color: var(--ice); }
  .tab-btn.completed { color: var(--green2); border-color: var(--green); }
  .tab-btn.active.completed { background: var(--done-bg); }

  /* ACHIEVEMENT */
  .achievement {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .achievement.completed { border-color: var(--green); background: var(--done-bg); }

  .achievement-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .achievement-header:hover { background: rgba(255,255,255,0.02); }

  .achievement-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    border: 1px solid var(--border2);
    background: var(--surface2);
  }
  .achievement.completed .achievement-icon { border-color: var(--green); background: var(--done-bg); }

  .achievement-title {
    flex: 1;
  }
  .achievement-title h2 {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--ice2);
    letter-spacing: 0.05em;
  }
  .achievement.completed .achievement-title h2 { color: var(--green2); }
  .achievement-title .fr-name {
    font-size: 0.82rem;
    color: var(--text3);
    font-style: italic;
  }

  .achievement-progress {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mini-bar-wrap {
    width: 80px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .mini-bar-fill {
    height: 100%;
    background: var(--ice);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .achievement.completed .mini-bar-fill { background: var(--green2); }
  .progress-text {
    font-size: 0.8rem;
    color: var(--text2);
    font-family: 'Cinzel', serif;
    white-space: nowrap;
  }
  .chevron {
    color: var(--text3);
    font-size: 0.8rem;
    transition: transform 0.2s;
  }
  .achievement.open .chevron { transform: rotate(180deg); }

  /* ACHIEVEMENT BODY */
  .achievement-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .achievement.open .achievement-body { display: block; }

  /* PARALLEL NOTE */
  .parallel-note {
    padding: 10px 20px;
    background: rgba(200,169,110,0.06);
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--gold);
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .parallel-note .icon { flex-shrink: 0; margin-top: 2px; }

  /* GLOBAL RESOURCES */
  .global-resources {
    padding: 12px 20px;
    background: rgba(126,184,212,0.04);
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--text2);
  }
  .global-resources strong { color: var(--ice); font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.05em; }

  /* BRANCH SELECTOR */
  .branch-selector {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .branch-label {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    color: var(--warn2);
  }
  .branch-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    padding: 6px 14px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .branch-btn:hover { color: var(--ice); border-color: var(--border2); }
  .branch-btn.selected { color: var(--ice2); border-color: var(--ice); background: rgba(126,184,212,0.08); }

  /* QUESTS */
  .quest {
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: background 0.2s;
  }
  .quest:last-child { border-bottom: none; }
  .quest:hover { background: rgba(255,255,255,0.015); }
  .quest.done { background: var(--done-bg); }
  .quest.locked { opacity: 0.45; pointer-events: none; }
  .quest.locked .quest-name { color: var(--locked-text); }

  /* Checkbox */
  .quest-check {
    width: 20px; height: 20px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    background: var(--surface2);
    font-size: 0.75rem;
  }
  .quest-check:hover { border-color: var(--ice); }
  .quest.done .quest-check { background: var(--green); border-color: var(--green2); color: white; }

  .quest-content { flex: 1; min-width: 0; }

  .quest-top {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .quest-num {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    color: var(--text3);
    flex-shrink: 0;
  }
  .quest-name {
    font-weight: 600;
    color: var(--text);
    font-size: 0.95rem;
  }
  .quest.done .quest-name { color: var(--text3); text-decoration: line-through; }

  .quest-badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-left: auto;
  }
  .badge {
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 3px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .badge-dungeon { background: rgba(192,68,68,0.15); color: var(--red); border: 1px solid rgba(192,68,68,0.3); }
  .badge-wait { background: rgba(192,120,32,0.15); color: var(--warn2); border: 1px solid rgba(192,120,32,0.3); }
  .badge-group { background: rgba(126,184,212,0.1); color: var(--ice); border: 1px solid rgba(126,184,212,0.2); }
  .badge-solo { background: rgba(90,109,132,0.2); color: var(--text2); border: 1px solid var(--border2); }
  .badge-choice { background: rgba(200,169,110,0.15); color: var(--gold); border: 1px solid rgba(200,169,110,0.3); }

  .quest-meta {
    margin-top: 5px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .quest-prereq {
    font-size: 0.8rem;
    color: var(--text3);
    display: flex;
    gap: 5px;
    align-items: flex-start;
  }
  .quest-prereq .prereq-icon { flex-shrink: 0; margin-top: 1px; }
  .prereq-cross { color: var(--warn); font-weight: 600; }

  .quest-zone {
    font-size: 0.82rem;
    color: var(--text2);
    font-style: italic;
    display: flex;
    gap: 5px;
  }

  .quest-resources {
    font-size: 0.8rem;
    color: var(--text2);
  }
  .quest-resources .res-label {
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    margin-right: 4px;
  }

  .quest-warning {
    font-size: 0.8rem;
    color: var(--warn2);
    display: flex;
    gap: 5px;
  }

  .quest-locked-msg {
    font-size: 0.78rem;
    color: var(--text3);
    font-style: italic;
    margin-top: 2px;
  }

  /* SECTION DIVIDER inside quests */
  .quest-section-header {
    padding: 8px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
  }

  /* COMPLETED BADGE */
  .achievement-done-badge {
    padding: 12px 20px;
    text-align: center;
    color: var(--green2);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    background: var(--done-bg);
    border-top: 1px solid var(--done-border);
  }

  /* RESET */
  .reset-btn {
    display: block;
    margin: 24px auto 0;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 8px 20px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text3);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .reset-btn:hover { color: var(--red); border-color: var(--red); }

  @media (max-width: 600px) {
    header h1 { font-size: 1.6rem; }
    .quest-badges { display: none; }
    .mini-bar-wrap { width: 50px; }
  }
</style>
</head>

</div>

// ═══════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════

const STORAGE_KEY = 'frigost_progress_v1';
const BRANCH_KEY = 'frigost_branches_v1';

let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let branches = JSON.parse(localStorage.getItem(BRANCH_KEY) || '{}'); // achievementId -> branchIndex

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
  localStorage.setItem(BRANCH_KEY, JSON.stringify(branches));
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════

function isQuestDone(id) { return !!done[id]; }

function isQuestLocked(quest, achievement) {
  // Check internal prereqs
  for (const pid of (quest.prereqs || [])) {
    if (!isQuestDone(pid)) return true;
  }
  // Branch logic
  if (quest.branch !== undefined && achievement.hasBranches) {
    const selectedBranch = branches[achievement.id];
    if (selectedBranch === undefined) {
      // No branch selected yet — lock all branch quests
      return true;
    }
    if (quest.branch !== selectedBranch) return true;
  }
  return false;
}

function getActiveQuests(achievement) {
  if (!achievement.hasBranches) return achievement.quests;
  const b = branches[achievement.id];
  if (b === undefined) return [];
  return achievement.quests.filter(q => q.branch === b);
}

function countDone(achievement) {
  const qs = getActiveQuests(achievement);
  return qs.filter(q => isQuestDone(q.id)).length;
}

function countTotal(achievement) {
  return getActiveQuests(achievement).length;
}

function isAchievementDone(achievement) {
  const total = countTotal(achievement);
  if (total === 0) return false;
  return countDone(achievement) === total;
}

function badgeHTML(badges) {
  const map = {
    dungeon: ['badge-dungeon', '⚔ Mazmorra'],
    wait: ['badge-wait', '⏳ Esperar'],
    group: ['badge-group', '👥 Grupo'],
    solo: ['badge-solo', '👤 Solo'],
    choice: ['badge-choice', '⚡ Inicio libre'],
  };
  return (badges || []).map(b => {
    const [cls, label] = map[b] || ['', b];
    return `<span class="badge ${cls}">${label}</span>`;
  }).join('');
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════

function renderAll() {
  renderTabs();
  renderAchievements();
  updateGlobal();
}

function renderTabs() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = ACHIEVEMENTS.map((a, i) => {
    const done = isAchievementDone(a);
    return `<button class="tab-btn${done ? ' completed' : ''}" onclick="scrollToAchievement('ach-${a.id}')" title="${a.nameFR}">${a.icon} ${a.name}</button>`;
  }).join('');
}

function scrollToAchievement(id) {
  const el = document.getElementById(id);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); openAchievement(id); }
}

function openAchievement(id) {
  const el = document.getElementById(id);
  if (el && !el.classList.contains('open')) el.classList.add('open');
}

function renderAchievements() {
  const container = document.getElementById('achievementsContainer');
  container.innerHTML = ACHIEVEMENTS.map(a => renderAchievement(a)).join('');
}

function renderAchievement(a) {
  const done = isAchievementDone(a);
  const doneCount = countDone(a);
  const total = countTotal(a);
  const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;

  let body = '';

  // Parallel note
  if (a.parallel) {
    body += `<div class="parallel-note"><span class="icon">🔀</span><span>${a.parallel}</span></div>`;
  }

  // Branch warning
  if (a.hasBranches && a.warning) {
    body += `<div class="parallel-note" style="color:var(--warn2);background:rgba(192,120,32,0.06)"><span class="icon">⚠</span><span>${a.warning}</span></div>`;
  }

  // Global resources
  if (a.globalResources) {
    body += `<div class="global-resources"><strong>RECURSOS GLOBALES: </strong>${a.globalResources}</div>`;
  }

  // Branch selector
  if (a.hasBranches) {
    const selectedBranch = branches[a.id];
    body += `<div class="branch-selector">
      <span class="branch-label">ELEGIR RAMA:</span>
      ${a.branches.map((b, i) => `<button class="branch-btn${selectedBranch === i ? ' selected' : ''}" onclick="selectBranch('${a.id}', ${i})">${b}</button>`).join('')}
      ${selectedBranch !== undefined ? `<button class="branch-btn" onclick="selectBranch('${a.id}', undefined)" style="color:var(--red);border-color:var(--red)">✕ Cambiar</button>` : ''}
    </div>`;
  }

  // Quests
  const questsToShow = a.hasBranches
    ? (branches[a.id] !== undefined ? a.quests.filter(q => q.branch === branches[a.id]) : [])
    : a.quests;

  if (a.hasBranches && branches[a.id] === undefined) {
    body += `<div class="quest"><div style="color:var(--text3);font-style:italic;font-size:0.9rem;padding:8px 0">Selecciona una rama para ver las misiones.</div></div>`;
  } else {
    body += questsToShow.map(q => renderQuest(q, a)).join('');
  }

  if (done) {
    body += `<div class="achievement-done-badge">✦ LOGRO COMPLETADO ✦</div>`;
  }

  // Extra info (list of locations etc)
  if (a.extraInfo) {
    body += `<div class="global-resources" style="border-top:1px solid var(--border)"><strong>MAPAS A VISITAR: </strong>${a.extraInfo.join(' · ')}</div>`;
  }

  return `
    <div class="achievement${done ? ' completed' : ''}" id="ach-${a.id}">
      <div class="achievement-header" onclick="toggleAchievement('ach-${a.id}')">
        <div class="achievement-icon">${a.icon}</div>
        <div class="achievement-title">
          <h2>${a.name}</h2>
          <div class="fr-name">${a.nameFR}</div>
        </div>
        <div class="achievement-progress">
          <div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
          <span class="progress-text">${doneCount}/${total}</span>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="achievement-body">${body}</div>
    </div>`;
}

function renderQuest(q, a) {
  const isDone = isQuestDone(q.id);
  const locked = isQuestLocked(q, a);

  let classes = 'quest';
  if (isDone) classes += ' done';
  if (locked && !isDone) classes += ' locked';

  const checkContent = isDone ? '✓' : '';

  let meta = '';

  // Cross prereqs
  if (q.crossPrereqs && q.crossPrereqs.length) {
    q.crossPrereqs.forEach(cp => {
      meta += `<div class="quest-prereq"><span class="prereq-icon">🔗</span><span><span class="prereq-cross">PREREQ CRUZADO:</span> ${cp.label} <span style="color:var(--text3)">— ${cp.logro}</span></span></div>`;
    });
  }

  // Zone
  if (q.zone) {
    meta += `<div class="quest-zone"><span>📍</span><span>${q.zone}</span></div>`;
  }

  // Resources
  if (q.resources) {
    meta += `<div class="quest-resources"><span class="res-label">ITEMS:</span>${q.resources}</div>`;
  }

  // Warning
  if (q.warning) {
    meta += `<div class="quest-warning"><span>⚠</span><span>${q.warning}</span></div>`;
  }

  if (locked && !isDone) {
    meta += `<div class="quest-locked-msg">🔒 Bloqueada — completa las misiones anteriores primero</div>`;
  }

  return `
    <div class="${classes}" id="quest-${q.id}">
      <div class="quest-check" onclick="toggleQuest('${q.id}', '${a.id}')">${checkContent}</div>
      <div class="quest-content">
        <div class="quest-top">
          <span class="quest-num">M${q.num}</span>
          <span class="quest-name">${q.name}</span>
          <div class="quest-badges">${badgeHTML(q.badges)}</div>
        </div>
        ${meta ? `<div class="quest-meta">${meta}</div>` : ''}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════

function toggleAchievement(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function toggleQuest(questId, achievementId) {
  done[questId] = !done[questId];
  save();
  renderAll();
  // Reopen
  openAchievement('ach-' + achievementId);
}

function selectBranch(achievementId, branchIndex) {
  if (branchIndex === undefined) {
    // Confirm before clearing
    if (!confirm('¿Seguro que quieres cambiar de rama? Se perderá el progreso de las misiones de la rama actual.')) return;
    delete branches[achievementId];
    // Clear done quests of this achievement
    const a = ACHIEVEMENTS.find(x => x.id === achievementId);
    if (a) a.quests.forEach(q => { delete done[q.id]; });
  } else {
    branches[achievementId] = branchIndex;
  }
  save();
  renderAll();
  openAchievement('ach-' + achievementId);
}

function updateGlobal() {
  let total = 0, doneCount = 0;
  ACHIEVEMENTS.forEach(a => {
    total += countTotal(a);
    doneCount += countDone(a);
  });
  const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
  document.getElementById('globalBar').style.width = pct + '%';
  document.getElementById('globalCount').textContent = `${doneCount} / ${total} misiones`;
}

function resetAll() {
  if (!confirm('¿Resetear TODO el progreso? Esta acción no se puede deshacer.')) return;
  done = {};
  branches = {};
  save();
  renderAll();
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderAll();
</script>
